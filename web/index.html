  <div id="root">

  <noscript>
    <section style="max-width:760px;margin:40px auto;padding:0 20px;line-height:1.7">
      <h1>Nível dos Rios do Rio Grande do Sul em Tempo Real</h1>
      <p>
        O <strong>RS River</strong> é um painel de monitoramento em tempo real do <strong>nível dos rios da
        Bacia do Guaíba</strong>, no Rio Grande do Sul. Acompanhe o <strong>nível do Guaíba</strong> em Porto
        Alegre e o nível do <strong>Rio dos Sinos</strong> (São Leopoldo, Taquara), <strong>Rio Caí</strong>
        (Feliz, São Sebastião do Caí), <strong>Rio Taquari</strong> (Lajeado, Muçum, Encantado, Roca Sales, Bom Retiro do Sul),
        <strong>Rio Jacuí</strong> (Cachoeira do Sul, Dona Francisca, Rio Pardo) e <strong>Rio Gravataí</strong>.
      </p>
      <p>
        Para cada cidade mostramos o nível atual, a cota de inundação, a tendência de subida (cm/h) e a margem
        para transbordo, com dados das redes telemétricas oficiais da <strong>ANA</strong> e do
        <strong>SGB/CPRM</strong>. Este painel é um projeto da associação
        <a href="https://guerreirosdohumaita.com.br">Guerreiros do Humaitá</a> — <em>O Povo pelo Povo!</em>
      </p>
      <p>Este painel precisa de JavaScript habilitado para exibir os dados ao vivo.</p>
    </section>
  </noscript>

  <script type="module" src="./app.js"></script>
  <script type="module">
    // Tela de erro clara caso o CDN do React não carregue.
    window.addEventListener("error", (e) => {
      if (String(e?.message || "").match(/import|module|fetch/i)) {
        const r = document.getElementById("root");
        if (r && !r.dataset.mounted) {
          r.innerHTML = '<div class="boot"><div class="boot-wave">⚠️</div>' +
            '<p>Não foi possível carregar as bibliotecas (React) da internet.<br/>' +
            'Verifique a conexão e recarregue a página.</p></div>';
        }
      }
    });
  </script>
